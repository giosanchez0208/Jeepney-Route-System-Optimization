global:
  cache_dir: ".cache"

# Workers (and the main process) load these caches instead of rebuilding the 36k-node CityGraph
# from the PBF and recomputing the DDM on every worker spawn -- essential for the persistent pool.
cg_pkl: rnd/pkl/profile_p1.pkl
ddm_pkl: rnd/pkl/ddm_8am.pkl

city_graph:
  name: "Iligan City"
  bbox: [8.1500, 8.3300, 124.1500, 124.4000]
  pbf_path: "utils/data/iligan-city.pbf"
  cache_prefix: "iligan_arterial"
  landmarks:
    MSU-IIT: [8.2415, 124.2435]
    Robinsons Place: [8.2175, 124.2380]

ddm:
  alpha: 0.6
  beta: 0.4

travel_graph:
  walk_wt: 0.0563
  ride_wt: 0.00632
  wait_wt: 14.44
  transfer_wt: 15.78
  direct_wt: 0.0
  alight_wt: 0.0

simulation:
  mohring_sample_size: 2000 # 38-route stability: mean allocation CV 0.11 at 2000 samples
  jeep_capacity: 16
  num_ticks: 540               # Uniform High-Fi ticks (540 @ 10s = 90 min)
  jeep_speed_kmh: 9.5   # calibrated PUJ operating speed (paper §3.1.4, ride_wt derivation).
                        # NOTE: the archived final_runs/p1-p9 were executed with the older value 20.0;
                        # keep that in mind when comparing future runs against those artifacts.
  passenger_speed_kmh: 4.5
  num_routes: 38               # final Iligan network size
  total_allocatable_jeeps: 2000 # real Iligan jeepney fleet (recent literature)
  weight_tolerance: 14.4
  spawn_rate_per_hour: 600.0   # raised from 200: CV<5% at 5 routes (variance-collapse calibration)
  spawn_stdev: 10.0
  seconds_per_tick: 10         # Uniform 10s Discretization Calibration

optimization:
  output_root: "outputs/iligan_runs"
  telemetry_interval: 1
  checkpoint_interval: 2
  # n_workers: 6              # cap parallel workers to fit RAM (each ~1-2GB at 38 routes/2000 jeeps); unset = cpu_count-1

  n_population: 10             # Production-grade population size
  g_max: 30                    # Full 30 generations
  n_stagnation: 30             # Stagnation ceiling aligned to generations
  n_elite: 1
  k_tournament: 3
  p_mutation: 0.25             # P1: Standard Mutation
  gamma_crossover: 0.5
  jaccard_patience: 30         # 30-generation phenotypic convergence window
  
  initial_tau: 1.0
  rho: 0.1
  q: 1000.0
  
  p_ls_attraction: 0.4         # P1: Standard local search attraction
  p_ls_repulsion: 0.4          # P1: Standard local search repulsion
  p_ls_pruning: 0.6
  
  default_jeep_weight: 1.0
  alpha_std_penalty: 0.5       # P1: Standard equity variance
  beta_penalty: 2.0