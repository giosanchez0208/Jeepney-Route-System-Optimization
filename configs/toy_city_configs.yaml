global:
  cache_dir: ".cache"

############ TOY CITY GRID ######################
# A synthetic 10×10 grid city for fast diagnostic runs.
# No PBF, no OSM API, no betweenness centrality, no TomTom calls.
# Grid is ~1km × 1km using real-ish Philippine coordinates
# so that haversine distances and speed calculations stay meaningful.
# 0.001° ≈ 111m lat, ≈ 110m lon at lat=8.2° → each cell ≈ 110m.

toy_city:
  grid_size: 50          # NxN grid → 2500 nodes
  origin_lon: 124.200    # Bottom-left corner (lon, lat)
  origin_lat: 8.200
  step_deg: 0.001        # ~110m per grid step

############ TOY DIRECT DEMAND MODEL ######################
# Demand is generated via IDW from named hotspots.
# Scaled for a 50x50 grid (bounding box: lon 124.200-124.250, lat 8.200-8.250).
#
# Spatial Topography:
#   - Downtown/CBD: Centralized high-density core.
#   - University Belt: Northern high-traffic cluster.
#   - North/South Terminals: Anchor points for cross-city transit.
#   - Mega Mall & BPO Hub: Mid-density commercial attractors.
#   - Suburbs: Low-density distributed residential generation.

toy_ddm:
  idw_power: 2.0
  hotspots:
    - name: "Downtown Public Market"
      lon: 124.220
      lat: 8.225
      weight: 15.0

    - name: "University Belt"
      lon: 124.225
      lat: 8.235
      weight: 12.0

    - name: "North Regional Terminal"
      lon: 124.230
      lat: 8.245
      weight: 10.0

    - name: "South City Terminal"
      lon: 124.215
      lat: 8.205
      weight: 10.0

    - name: "Mega Mall Complex"
      lon: 124.235
      lat: 8.220
      weight: 9.0

    - name: "BPO / Tech Park"
      lon: 124.210
      lat: 8.230
      weight: 8.0

    - name: "City General Hospital"
      lon: 124.215
      lat: 8.235
      weight: 7.0

    - name: "Heavy Industrial Zone"
      lon: 124.240
      lat: 8.210
      weight: 6.0

    - name: "Suburban Residential (East)"
      lon: 124.245
      lat: 8.225
      weight: 3.0

    - name: "Suburban Residential (Northeast)"
      lon: 124.245
      lat: 8.245
      weight: 2.0

    - name: "Suburban Residential (Southwest)"
      lon: 124.205
      lat: 8.205
      weight: 2.5

########## TRAVEL GRAPH WEIGHTS ########################
# Identical to iligan_configs — we want to exercise the same
# weight regime so bugs found here transfer to the real city.
travel_graph:
  walk_wt: 0.0142
  ride_wt: 0.0071
  wait_wt: 8.5
  transfer_wt: 14.2
  direct_wt: 0.0
  alight_wt: 0.0

########## SIMULATION PARAMETERS ########################
# Drastically reduced for fast iteration:
#   num_ticks: 30  → 30 × 30s = 15 minutes simulated
#   num_routes: 5  → manageable TravelGraph stitch size
#   total_allocatable_jeeps: 20
#   spawn_rate_per_hour: 120 → ~1 passenger/tick on average
simulation:
  mohring_sample_size: 100
  jeep_capacity: 16
  num_ticks: 1000 # 1000 × 30s = 8.3 hours simulated, enough to see demand patterns stabilize
   # 60 min allows for longer trips and transfer overhead in a small grid.
   # Passengers beyond this are correctly penalized as unserved.
  jeep_speed_kmh: 20.0
  passenger_speed_kmh: 4.5
  num_routes: 5
  total_allocatable_jeeps: 20
  weight_tolerance: 50.0
  spawn_rate_per_hour: 120.0
  spawn_stdev: 10.0
  seconds_per_tick: 30

########## OPTIMIZATION PARAMETERS ########################
optimization:
  output_root: "outputs/toy_runs"
  telemetry_interval: 2
  checkpoint_interval: 5
  
  n_population: 10
  g_max: 30
  n_stagnation: 8
  n_elite: 2
  k_tournament: 3
  p_mutation: 0.25
  gamma_crossover: 0.5
  jaccard_patience: 30
  
  initial_tau: 1.0
  rho: 0.15
  q: 1000.0
  
  p_ls_attraction: 0.4 # Aggressive geometric expansion
  p_ls_repulsion: 0.4 # Maintains systemic equilibrium with attraction
  p_ls_pruning: 0.6 # Operates at higher frequency than additive mutations, acts as continuous garbage collection protool
  
  default_jeep_weight: 1.0
  alpha_std_penalty: 0.5
  beta_penalty: 2.0