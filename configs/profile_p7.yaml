global:
  cache_dir: ".cache"

city_graph:
  name: "Iligan City"
  bbox: [8.1500, 8.3300, 124.1500, 124.4000]
  pbf_path: "utils/data/iligan-city.pbf"
  cache_prefix: "iligan_arterial"
  landmarks:
    MSU-IIT: [8.2415, 124.2435]
    Robinsons Place: [8.2175, 124.2380]

ddm:
  alpha: 0.6
  beta: 0.4
  idw_power: 2.0

travel_graph:
  walk_wt: 0.0142
  ride_wt: 0.0071
  wait_wt: 15.0                # P7: Extreme wait weight increase
  transfer_wt: 28.4            # P7: Extreme transfer penalty increase
  direct_wt: 0.0
  alight_wt: 0.0

simulation:
  mohring_sample_size: 200
  jeep_capacity: 16
  num_ticks: 540
  jeep_speed_kmh: 20.0
  passenger_speed_kmh: 4.5
  num_routes: 5
  total_allocatable_jeeps: 470
  weight_tolerance: 25.0       # P7: Extreme commuter patience reduction
  spawn_rate_per_hour: 200.0
  spawn_stdev: 10.0
  seconds_per_tick: 10

optimization:
  output_root: "outputs/iligan_runs"
  telemetry_interval: 1
  checkpoint_interval: 2
  
  n_population: 10             # Production-grade population size
  g_max: 30                    # Full 30 generations
  n_stagnation: 30             # Stagnation ceiling
  n_elite: 1
  k_tournament: 3
  p_mutation: 0.25
  gamma_crossover: 0.5
  jaccard_patience: 30         # 30-generation phenotypic convergence window
  
  initial_tau: 1.0
  rho: 0.1
  q: 1000.0
  
  p_ls_attraction: 0.4
  p_ls_repulsion: 0.4
  p_ls_pruning: 0.6
  
  default_jeep_weight: 1.0
  alpha_std_penalty: 0.5
  beta_penalty: 2.0
