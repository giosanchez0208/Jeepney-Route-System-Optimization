# Toy-city config for the MEMETIC + OPTIMIZATION showcases (fig_memetic.py, run_toy_optimization.py).
# Same 50x50 grid as configs/toy_city_configs.yaml, but the demand uses the additive GAUSSIAN kernel
# to look like a real city: a dominant central business district + a Port sub-center fading to a quiet
# residential periphery (vs the default IDW weighted-average, which fills the grid ~uniformly).
# nb_4_3_6 and other toy users stay on the IDW default.

toy_city:
  grid_size: 50
  origin_lon: 124.200
  origin_lat: 8.200
  step_deg: 0.001

toy_ddm:
  kernel: gaussian        # additive distance-decay: concentrated cores, quiet periphery
  sigma_deg: 0.005        # core radius (~550 m); smaller = sharper cores, larger = more blended
  floor: 0.4              # small uniform base so residential areas are quiet but not dead
  idw_power: 2.0          # unused when kernel=gaussian; kept for completeness
  hotspots:
    - name: Downtown CBD
      lon: 124.224
      lat: 8.226
      weight: 14.0
    - name: Public Market
      lon: 124.236
      lat: 8.232
      weight: 10.0
    - name: Jeepney Terminal
      lon: 124.214
      lat: 8.236
      weight: 9.0
    - name: University
      lon: 124.242
      lat: 8.242
      weight: 7.0
    - name: Port
      lon: 124.208
      lat: 8.210
      weight: 6.0

travel_graph:
  walk_wt: 0.0563
  ride_wt: 0.00632
  wait_wt: 14.44
  transfer_wt: 15.78
  direct_wt: 0.0
  alight_wt: 0.0

simulation:
  num_routes: 6
  total_allocatable_jeeps: 60
  jeep_speed_kmh: 40.0
  jeep_capacity: 16
  passenger_speed_kmh: 5.0
  spawn_rate_per_hour: 600.0
  spawn_stdev: 5.0
  seconds_per_tick: 10
  num_ticks: 540
  weight_tolerance: 14.44
  equidistant_spawn: true

optimization:
  output_root: outputs/
  telemetry_interval: 1
  checkpoint_interval: 10
  n_population: 20
  g_max: 30
  n_stagnation: 10
  n_elite: 2
  k_tournament: 3
  p_mutation: 0.2
  gamma_crossover: 0.5
  jaccard_patience: 30
  initial_tau: 1.0
  rho: 0.1
  q: 1000.0
  p_ls_attraction: 0.4
  p_ls_repulsion: 0.4
  p_ls_pruning: 0.6
  default_jeep_weight: 1.0
  alpha_std_penalty: 0.5
  beta_penalty: 2.0

BETA_PENALTY: 2.0
ALPHA_STD_PENALTY: 0.5
ETA_PENALTY: 2.5
disable_tqdm: false
