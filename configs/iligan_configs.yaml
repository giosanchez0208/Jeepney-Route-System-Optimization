global:
  cache_dir: ".cache"

############ CITY GRAPH ######################
# The coordinates (8.1500, 8.3300, 124.1500, 124.4000) define the exact operational footprint of the current Iligan City jeepney network. Evaluating a proposed transit system requires a direct comparison against the existing baseline. The bounding box was selected strictly to enclose all currently active routes and terminal nodes. This ensures the memetic algorithm operates within the identical spatial constraints as the current system. This geographic parity is required to validate any simulated reductions in passenger commute time. 

city_graph:
  name: "Iligan City"
  bbox: [8.1500, 8.3300, 124.1500, 124.4000]
  pbf_path: "utils/data/iligan-city.pbf"
  cache_prefix: "iligan_arterial"
  landmarks:
    MSU-IIT: [8.2415, 124.2435]
    Robinsons Place: [8.2175, 124.2380]

############ DIRECT DEMAND MODEL ######################
# Since standard formal rules and operating data do not apply, spatial heuristics and sensitivity testing are the only mathematically sound approaches for initial model convergence. Global Network for Popular Transportation & UNDP. (2024). A Closer Look at Informal (Popular) Transportation: An Emerging Portrait. United Nations Development Programme.
# Jeepneys are treated as semi-flexible agents. This paper explicitly links Southeast Asian paratransit (including Philippine jeepneys) to DRT algorithms. This justifies using jeepney routes as demand-responsive agents reacting to spatial probability distributions (DDM) rather than fixed historical origin-destination matrices. Vongpraseuth, T., et al. (2025). Acceptance and Demand Estimation of Demand Responsive Transit (DRT) in a Least Developed Country: The Case of Paratransit. International Journal of Connected Transportation.
# Ramos-Santiago demonstrates that while structural network topology (centrality) is important, local activity indicators fundamentally amplify ridership generation. This is the reasoning behind higher coefficient of 0.6 and structural proxy lower coefficient 0.4 split. It grounds the assumption that raw local activity (TomTom flow) exerts a statistically heavier pull on passenger generation than pure geometric network location (Betweenness Centrality).

ddm:
  alpha: 0.6
  beta: 0.4
  idw_power: 2.0

########## TRAVEL GRAPH WEIGHTS ########################
travel_graph:
  walk_wt: 0.0142
  ride_wt: 0.0071
  wait_wt: 8.5
  transfer_wt: 14.2
  direct_wt: 0.0
  alight_wt: 0.0

########## SIMULATION PARAMETERS ########################
# seconds_per_tick: 30 — at 20 km/h effective speed, each tick = ~166m, one city block. Right granularity for node-level boarding.
# num_ticks: 180 — 180 × 30s = 90 min simulated. Iligan cross-city trip benchmark is 30 min (Tambo→city center).
#   90 min is a generous ceiling that covers trip + transfer overhead. Passengers beyond this are correctly penalized as unserved.
# jeep_speed_kmh: 20.0 — JICA studies: 9–10 km/h dense congestion; Baguio study: 9–25 km/h secondary city range.
#   Iligan is less congested than Metro Manila. 20 km/h is the midpoint for a mid-sized Philippine city with traffic stops.
# passenger_speed_kmh: 4.5 — UP Diliman / NCTS Philippine pedestrian benchmark: 4.23 km/h.
#   Rounded to 4.5 to account for a working-age commuter population mix.
# spawn_rate_per_hour: 600 — Iligan pop. ~390k; ~40% jeepney modal share = ~156k trips/day.
#   Peak hour ≈ 1.5× average across 16 active hours ≈ 14,600 city-wide trips/hr.
#   Scaling for simulated corridor coverage (~70%) and OD sampling: ~600 pax/hr is a realistic peak-hour figure.
# spawn_stdev: 30 — Higher variance for paratransit demand bursts (school dismissals, market hours, shift changes).
#   A stdev of 30 relative to base 600/hr allows realistic spikes to 700–900/hr.
simulation:
  mohring_sample_size: 2000
  jeep_capacity: 16
  num_ticks: 180
  jeep_speed_kmh: 20.0 # JICA studies: 9–10 km/h dense congestion; Baguio study: 9–25 km/h secondary city range.
  passenger_speed_kmh: 4.5 # UP Diliman / NCTS benchmark: 4.23 km/h for Philippine urban pedestrians
  num_routes: 20
  total_allocatable_jeeps: 100
  weight_tolerance: 50.0
  spawn_rate_per_hour: 600.0 # Iligan pop. ~390k; ~40% jeepney modal share = ~156k trips/day. Peak hour ≈ 1.5× average across 16 active hours ≈ 14,600 city-wide trips/hr. Scaling for simulated corridor coverage (~70%) and OD sampling: ~600 pax/hr is a realistic peak-hour figure.
  spawn_stdev: 30.0 # Higher variance for paratransit demand bursts (school dismissals, market hours, shift changes). A stdev of 30 relative to base 600/hr allows realistic spikes to 700–900/hr.
  seconds_per_tick: 30

