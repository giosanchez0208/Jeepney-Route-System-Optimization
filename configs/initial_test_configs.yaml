# configs/initial_test_configs.yaml

# ==========================================
# FILE PATHS & GEOGRAPHY
# ==========================================
TRAFFIC_CSV_PATH: "data/iligan_node_with_traffic_data.csv"
CITY_BOUNDS: [8.1450, 8.3150, 124.1350, 124.3050]

# ==========================================
# SYSTEM ARCHITECTURE CONSTRAINTS
# ==========================================
K_ROUTES: 5               # Strict number of routes each candidate system must maintain
TOTAL_FLEET: 15           # Total allocatable jeepneys across the system

# ==========================================
# ORCHESTRATOR TELEMETRY & I/O
# ==========================================
OUTPUT_ROOT: "results/runs"
TELEMETRY_INTERVAL: 100   # Generations between metric logging
CHECKPOINT_INTERVAL: 1000 # Generations between full state serialization (.state pickle)

# ==========================================
# PHASE D: GENETIC ALGORITHM PARAMETERS
# ==========================================
N_POPULATION: 20          # Total individuals per generation
G_MAX: 100000             # Absolute generation ceiling
N_STAGNATION: 15          # Patience threshold for early stopping
N_ELITE: 2                # Top-performing individuals preserved unmodified
K_TOURNAMENT: 3           # Sample size for parent selection
P_MUTATION: 0.2           # Base probability for stochastic exploration
GAMMA_CROSSOVER: 0.5      # Weighting coefficient for pheromone inheritance

# ==========================================
# PHASES B & C: ACO & LOCAL SEARCH
# ==========================================
INITIAL_PHEROMONE: 1.0        # Baseline tau loaded onto street edges
RHO_EVAPORATION: 0.1          # Evaporation rate per generation
Q_PHEROMONE_INTENSITY: 1000.0 # Multiplier for demand deposition
P_LOCAL_SEARCH: 0.5           # Probability of applying demand-driven heuristics

# ==========================================
# FITNESS EVALUATION PENALTIES (SURROGATE & SIM)
# ==========================================
WALK_WT: 0.0142
RIDE_WT: 0.0071
WAIT_WT: 8.5
TRANSFER_WT: 14.2
ALPHA_STD_PENALTY: 0.5    # Multiplier penalizing commute time standard deviation
BETA_PENALTY: 2.0         # Multiplier penalizing incomplete passenger journeys

# ==========================================
# PHASE A: FINAL VALIDATION SIMULATION
# ==========================================
MAX_TICKS: 3600           # Duration of the final validation simulation
PASSENGER_SPEED: 5.0
JEEP_SPEED: 10.0
JEEP_CAPACITY: 16
SPAWN_RATE_PER_100: 50.0  # Mean passenger spawn rate
SPAWN_STDEV: 10.0         # Standard deviation of spawn rate
WEIGHT_TOLERANCE: 50.0
EQUIDISTANT_SPAWN: true