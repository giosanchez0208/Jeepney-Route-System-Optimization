# configs/initial_test_configs.yaml

# ==========================================
# FILE PATHS & GEOGRAPHY
# ==========================================
TRAFFIC_CSV_PATH: "data/iligan_node_with_traffic_data.csv"
CITY_BOUNDS: [8.1450, 8.3150, 124.1350, 124.3050]

# ==========================================
# SYSTEM ARCHITECTURE CONSTRAINTS
# ==========================================
K_ROUTES: 12              # Minimum to cover primary university and market arteries
TOTAL_FLEET: 180          # Approx. 15 units per route for realistic coverage

# ==========================================
# ORCHESTRATOR TELEMETRY & I/O
# ==========================================
OUTPUT_ROOT: "results/runs"
TELEMETRY_INTERVAL: 1     # Essential for visibility in 10-generation runs
CHECKPOINT_INTERVAL: 10   # Serializes state at termination

# ==========================================
# PHASE D: GENETIC ALGORITHM PARAMETERS
# ==========================================
N_POPULATION: 50          # Higher diversity for short generation ceilings
G_MAX: 20                 # User-requested generation limit
N_STAGNATION: 10          
N_ELITE: 5                # Preserves top 10% of the population
K_TOURNAMENT: 5           
P_MUTATION: 0.3           # Increased for broader exploration in short runs
GAMMA_CROSSOVER: 0.5      

# ==========================================
# PHASES B & C: ACO & LOCAL SEARCH
# ==========================================
INITIAL_PHEROMONE: 1.0
RHO_EVAPORATION: 0.1
Q_PHEROMONE_INTENSITY: 1000.0
P_LOCAL_SEARCH: 0.5

# ==========================================
# FITNESS EVALUATION PENALTIES (SURROGATE & SIM)
# ==========================================
WALK_WT: 0.0142
RIDE_WT: 0.0071
WAIT_WT: 8.5
TRANSFER_WT: 14.2
ALPHA_STD_PENALTY: 0.5
BETA_PENALTY: 2.0

# ==========================================
# PHASE A: FINAL VALIDATION SIMULATION
# Speed values are km/h and one tick equals one second.
# ==========================================
MAX_TICKS: 3600
PASSENGER_SPEED: 5.0
JEEP_SPEED: 10.0
JEEP_CAPACITY: 16
SPAWN_RATE_PER_100: 85.0  # Peak-hour demand based on university traffic patterns
SPAWN_STDEV: 15.0
WEIGHT_TOLERANCE: 50.0
EQUIDISTANT_SPAWN: true
